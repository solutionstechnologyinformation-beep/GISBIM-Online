version: "1"
services:
- type: web
  name: gisbim-online
  runtime: docker
  repo: https://github.com/solutionstechnologyinformation-beep/GISBIM-Online
  plan: free
  region: oregon
  # Render detectará automaticamente o Dockerfile na raiz do projeto
  dockerContext: .
  dockerfilePath: ./Dockerfile
  autoDeploy: true
  envVars:
  - key: FLASK_ENV
    value: production
  - key: PORT
    value: 5000
  - key: HOST
    value: 0.0.0.0
  - key: PYTHONPATH
    value: /app
